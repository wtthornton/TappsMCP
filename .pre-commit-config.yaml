repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
      - id: mypy
        additional_dependencies:
          - pydantic>=2.0
          - types-PyYAML
        args: [--strict]
        pass_filenames: false
        entry: mypy src/

  # TAP-979: gate commits on the tapps-mcp quality pipeline. Bypass with
  # SKIP=tapps-validate-changed git commit ... or TAPPS_SKIP_GATE=1.
  - repo: local
    hooks:
      - id: tapps-validate-changed
        name: tapps-mcp validate-changed (quick)
        entry: uv run tapps-mcp validate-changed --quick
        language: system
        pass_filenames: false
        types: [python]
        stages: [pre-commit]
