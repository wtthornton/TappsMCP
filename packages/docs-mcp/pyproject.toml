[build-system]
requires = ["hatchling>=1.30.1,<2"]
build-backend = "hatchling.build"

[project]
name = "docs-mcp"
version = "3.12.30"
description = "MCP server for automated documentation generation, validation, and maintenance"
readme = "docs/README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "TappsMCP Contributors" },
]
keywords = ["mcp", "documentation", "docs", "readme", "changelog", "api-docs", "code-analysis"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Documentation",
    "Topic :: Software Development :: Documentation",
    "Typing :: Typed",
]
dependencies = [
    "tapps-core>=1.0.0",
    "mcp[cli]>=1.27.2,<2",
    "click>=8.4.1,<9",
    "jinja2>=3.1.6,<4",
    "gitpython>=3.1.49,<4",
    "pydantic>=2.13.4,<3",
    "structlog>=26.1.0,<27",
    "pyyaml>=6.0.3,<7",
    # Security floors for transitive CVEs via mcp[cli] (TAP-608).
    "cryptography>=49.0.0,<50",        # CVE-2026-26007, -34073, -39892
    "pyjwt>=2.13.0,<3",                # CVE-2026-32597
    "python-multipart>=0.0.32,<1",     # CVE-2026-40347, CVE-2026-42561
    "python-dotenv>=1.2.2,<2",         # CVE-2026-28684 via pydantic-settings
]

[project.optional-dependencies]
treesitter = [
    "tree-sitter>=0.25.2,<1",
    "tree-sitter-typescript>=0.23.2,<1",
    "tree-sitter-go>=0.25.0,<1",
    "tree-sitter-rust>=0.24.2,<1",
    "tree-sitter-java>=0.23.5,<1",
]
agents = [
    "sentence-transformers>=5.5.1,<6",
]

[tool.uv.sources]
tapps-core = { workspace = true }

[project.scripts]
docsmcp = "docs_mcp.cli:cli"

[project.urls]
Homepage = "https://github.com/tapps-mcp/tapps-mcp"
Repository = "https://github.com/tapps-mcp/tapps-mcp"
Documentation = "https://github.com/tapps-mcp/tapps-mcp/tree/master/packages/docs-mcp"
Issues = "https://github.com/tapps-mcp/tapps-mcp/issues"

[tool.hatch.build.targets.sdist]
include = ["src/docs_mcp/"]

[tool.hatch.build.targets.wheel]
packages = ["src/docs_mcp"]
