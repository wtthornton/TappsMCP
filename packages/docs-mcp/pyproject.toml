[build-system]
requires = ["hatchling>=1.28,<2"]
build-backend = "hatchling.build"

[project]
name = "docs-mcp"
version = "3.1.0"
description = "MCP server for automated documentation generation, validation, and maintenance"
readme = "docs/README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "TappsMCP Contributors" },
]
keywords = ["mcp", "documentation", "docs", "readme", "changelog", "api-docs", "code-analysis"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Documentation",
    "Topic :: Software Development :: Documentation",
    "Typing :: Typed",
]
dependencies = [
    "tapps-core>=1.0.0",
    "mcp[cli]>=1.26.0,<2",
    "click>=8.3.1,<9",
    "jinja2>=3.1.6,<4",
    "gitpython>=3.1.44,<4",
    "pydantic>=2.12.5,<3",
    "structlog>=25.5.0,<26",
    "pyyaml>=6.0.3,<7",
    # Security floors for transitive CVEs via mcp[cli] (TAP-608).
    "cryptography>=46.0.7,<47",        # CVE-2026-26007, -34073, -39892
    "pyjwt>=2.12.0,<3",                # CVE-2026-32597
    "python-multipart>=0.0.26,<1",     # CVE-2026-40347
]

[project.optional-dependencies]
treesitter = [
    "tree-sitter>=0.24.0,<1",
    "tree-sitter-typescript>=0.23.2,<1",
    "tree-sitter-go>=0.23.4,<1",
    "tree-sitter-rust>=0.23.2,<1",
    "tree-sitter-java>=0.23.5,<1",
]
agents = [
    "sentence-transformers>=5.2.3,<6",
]

[tool.uv.sources]
tapps-core = { workspace = true }

[project.scripts]
docsmcp = "docs_mcp.cli:cli"

[project.urls]
Homepage = "https://github.com/tapps-mcp/tapps-mcp"
Repository = "https://github.com/tapps-mcp/tapps-mcp"
Documentation = "https://github.com/tapps-mcp/tapps-mcp/tree/master/packages/docs-mcp"
Issues = "https://github.com/tapps-mcp/tapps-mcp/issues"

[tool.hatch.build.targets.sdist]
include = ["src/docs_mcp/"]

[tool.hatch.build.targets.wheel]
packages = ["src/docs_mcp"]
