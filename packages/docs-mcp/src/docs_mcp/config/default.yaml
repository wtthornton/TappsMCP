# DocsMCP default configuration
# Override in .docsmcp.yaml at your project root.

output_dir: docs
default_style: standard
default_format: markdown
include_toc: true
include_badges: true
changelog_format: keep-a-changelog
adr_format: madr
diagram_format: mermaid  # mermaid | plantuml | d2
git_log_limit: 500
log_level: INFO
log_json: false

# Style checking (Epic 84)
style_enabled_rules:
  - passive_voice
  - jargon
  - sentence_length
  - heading_consistency
  - tense_consistency
style_heading: sentence   # sentence | title
style_max_sentence_words: 40
style_custom_terms: []    # project-specific terms excluded from jargon
style_jargon_terms: []    # custom jargon (overrides defaults when non-empty)
style_include_in_project_scan: true   # include style_summary in docs_project_scan
style_auto_detect_terms: false        # scan *.py for class/def names -> custom_terms
style_auto_detect_max_files: 120
style_auto_detect_max_terms: 80
