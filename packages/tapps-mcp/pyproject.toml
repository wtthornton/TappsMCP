[build-system]
requires = ["hatchling>=1.30.1,<2"]
build-backend = "hatchling.build"

[project]
name = "tapps-mcp"
version = "3.12.50"
description = "MCP server providing deterministic code quality tools for AI coding assistants"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "TappsMCP Contributors" },
]
keywords = ["mcp", "code-quality", "linting", "security", "scoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Quality Assurance",
    "Typing :: Typed",
]
dependencies = [
    "tapps-core>=1.0.0",
    "docs-mcp>=0.1.0",
    "mcp[cli]>=1.27.2,<2",
    "pydantic>=2.13.4,<3",
    "pydantic-settings>=2.14.1,<3",
    "structlog>=26.1.0,<27",
    "pyyaml>=6.0.3,<7",
    "click>=8.4.1,<9",
    "anyio>=4.13.0,<5",
    "httpx>=0.28.1,<1",
    "filelock>=3.29.4,<4",
    "bandit>=1.8",
    # NOTE (TAP-4529): semgrep is an OPTIONAL checker, deliberately NOT pinned
    # here. Its transitive pins (click<8.2, tomli<2.1) conflict irreconcilably
    # with this workspace's click>=8.4.1 and pip-audit's tomli>=2.2.1, so a hard
    # dependency would make `uv sync` unresolvable. The scoring path degrades
    # gracefully when semgrep is absent (records a skipped-checker note). To
    # enable it, install the binary out-of-band, e.g. `pipx install semgrep` or
    # `uv pip install semgrep`, and it is auto-detected via shutil.which.
    "defusedxml>=0.7.1,<1",
    "radon>=6.0",
    "vulture>=2.14",
    "pylint>=3.3",
    "perflint>=0.8",
    "pip-audit>=2.10.1",
    # Security floors for transitive CVEs (TAP-608). Remove once the
    # parents (mcp, pip-audit, bandit, pytest) bump their pins past these.
    "cryptography>=49.0.0,<50",        # CVE-2026-26007, -34073, -39892 via mcp[cli]->pyjwt[crypto]
    "pygments>=2.20.0,<3",             # CVE-2026-4539 via bandit->rich, pytest
    "pyjwt>=2.13.0,<3",                # CVE-2026-32597 via mcp[cli]
    "python-multipart>=0.0.32,<1",     # CVE-2026-40347, CVE-2026-42561 via mcp[cli]
    "requests>=2.34.2,<3",             # CVE-2026-25645 via pip-audit->cachecontrol
    "urllib3>=2.7.0,<3",               # CVE-2026-44431, CVE-2026-44432 via pip-audit->requests
    "python-dotenv>=1.2.2,<2",         # CVE-2026-28684 via mcp[cli]->pydantic-settings
    "pip>=26.1.2",                      # CVE-2026-3219, CVE-2026-6357 via pip-audit->pip-api
]

[project.optional-dependencies]
dev = [
    "pytest>=9.1.0,<10",
    "pytest-asyncio>=1.4.0,<2",
    "pytest-cov>=7.1.0,<8",
    "pytest-timeout>=2.4.0,<3",
    "mypy>=2.1.0,<3",
    "ruff>=0.15.17,<1",
    "pre-commit>=4.6.0,<5",
    "types-PyYAML>=6.0.12",
    "playwright>=1.60.0,<2",
]
perf = [
    # pylint and perflint are now base dependencies
]
rag = [
    "faiss-cpu>=1.14.3,<2",
    "sentence-transformers>=5.5.1,<6",
    "numpy>=2.4.6,<3",
]
vector = [
    "faiss-cpu>=1.14.3,<2",
    "sentence-transformers>=5.5.1,<6",
    "numpy>=2.4.6,<3",
]
pip-audit = [
    # pip-audit is now a base dependency
]
treesitter = [
    "tree-sitter>=0.25.2,<1",
    "tree-sitter-typescript>=0.23.2,<1",
    "tree-sitter-go>=0.25.0,<1",
    "tree-sitter-rust>=0.24.2,<1",
]

[project.scripts]
tapps-mcp = "tapps_mcp.cli:main"
tapps-platform = "tapps_mcp.platform.cli:cli"

[project.urls]
Homepage = "https://github.com/tapps-mcp/tapps-mcp"
Repository = "https://github.com/tapps-mcp/tapps-mcp"
Documentation = "https://github.com/tapps-mcp/tapps-mcp#readme"
Issues = "https://github.com/tapps-mcp/tapps-mcp/issues"
Changelog = "https://github.com/tapps-mcp/tapps-mcp/blob/master/CHANGELOG.md"

[tool.uv.sources]
tapps-core = { workspace = true }
docs-mcp = { workspace = true }

[tool.hatch.build.targets.sdist]
include = ["src/tapps_mcp/"]

[tool.hatch.build.targets.wheel]
packages = ["src/tapps_mcp"]
