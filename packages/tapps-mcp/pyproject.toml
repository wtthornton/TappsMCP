[build-system]
requires = ["hatchling>=1.28,<2"]
build-backend = "hatchling.build"

[project]
name = "tapps-mcp"
version = "1.0.0"
description = "MCP server providing deterministic code quality tools for AI coding assistants"
readme = "README.md"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "TappsMCP Contributors" },
]
keywords = ["mcp", "code-quality", "linting", "security", "scoring"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Quality Assurance",
    "Typing :: Typed",
]
dependencies = [
    "tapps-core>=1.0.0",
    "mcp[cli]>=1.26.0,<2",
    "pydantic>=2.12.5,<3",
    "pydantic-settings>=2.13.1,<3",
    "structlog>=25.5.0,<26",
    "pyyaml>=6.0.3,<7",
    "click>=8.3.1,<9",
    "anyio>=4.12.1,<5",
    "httpx>=0.28.1,<1",
    "filelock>=3.24.3,<4",
]

[project.optional-dependencies]
dev = [
    "pytest>=9.0.2,<10",
    "pytest-asyncio>=1.3.0,<2",
    "pytest-cov>=7.0.0,<8",
    "pytest-timeout>=2.4.0,<3",
    "mypy>=1.19.1,<2",
    "ruff>=0.15.2,<1",
    "pre-commit>=4.5.1,<5",
    "types-PyYAML>=6.0.12",
    "playwright>=1.58.0,<2",
]
rag = [
    "faiss-cpu>=1.13.2,<2",
    "sentence-transformers>=5.2.3,<6",
    "numpy>=2.4.2,<3",
]
vector = [
    "faiss-cpu>=1.13.2,<2",
    "sentence-transformers>=5.2.3,<6",
    "numpy>=2.4.2,<3",
]
pip-audit = [
    "pip-audit>=2.7.0",
]
treesitter = [
    "tree-sitter>=0.24.0,<1",
    "tree-sitter-typescript>=0.23.2,<1",
    "tree-sitter-go>=0.23.4,<1",
    "tree-sitter-rust>=0.23.2,<1",
]

[project.scripts]
tapps-mcp = "tapps_mcp.cli:main"
tapps-platform = "tapps_mcp.platform.cli:cli"

[project.urls]
Homepage = "https://github.com/tapps-mcp/tapps-mcp"
Repository = "https://github.com/tapps-mcp/tapps-mcp"
Documentation = "https://github.com/tapps-mcp/tapps-mcp#readme"
Issues = "https://github.com/tapps-mcp/tapps-mcp/issues"
Changelog = "https://github.com/tapps-mcp/tapps-mcp/blob/master/CHANGELOG.md"

[tool.uv.sources]
tapps-core = { workspace = true }

[tool.hatch.build.targets.sdist]
include = ["src/tapps_mcp/"]

[tool.hatch.build.targets.wheel]
packages = ["src/tapps_mcp"]
