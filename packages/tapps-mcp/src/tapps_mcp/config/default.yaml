# TappsMCP default configuration
# Override per-project in .tapps-mcp.yaml or via TAPPS_MCP_* env vars.

quality_preset: standard
log_level: INFO
log_json: false
tool_timeout: 30

scoring_weights:
  complexity: 0.18
  security: 0.27
  maintainability: 0.24
  test_coverage: 0.13
  performance: 0.08
  structure: 0.05
  devex: 0.05

adaptive:
  enabled: false
  learning_rate: 0.1
  min_outcomes: 5

# Memory hooks (Epic 65.4–65.5) — defaults on for POC; disable in .tapps-mcp.yaml if noisy
memory_hooks:
  auto_recall:
    enabled: true
    max_results: 5
    min_score: 0.3
    min_prompt_length: 50
  auto_capture:
    enabled: true
    max_facts: 5

memory:
  enabled: true
  profile: repo-brain
  gc_enabled: true
  contradiction_check_on_start: true
  max_memories: 1500
  inject_into_experts: true
  # M4 pipeline memory integrations — on by default for POC
  auto_save_quality: true
  track_recurring_quick_check: true
  recurring_quick_check_threshold: 3
  enrich_impact_analysis: true
  auto_supersede_architectural: true
  capture_prompt: |
    Store durable memories: architectural (project structure, key decisions), pattern (coding conventions, recurring solutions), context (session-specific facts that matter next week).
    Skip: raw action logs, transient state, sensitive data.
    If it won't change future decisions, don't store it.
  write_rules:
    block_sensitive_keywords: ["password", "secret", "api_key", "token"]
    min_value_length: 10
    max_value_length: 4096
  safety:
    enforcement: warn
  semantic_search:
    enabled: false
    provider: sentence_transformers
    model: all-MiniLM-L6-v2
  decay:
    architectural_half_life_days: 180
    pattern_half_life_days: 60
    context_half_life_days: 14
    confidence_floor: 0.1
  # Optional reranking (Epic 65.9) — improves precision after retrieval
  reranker:
    enabled: false
    provider: noop  # noop | cohere
    top_k: 10
    # api_key: ${COHERE_API_KEY}  # required when provider=cohere; incurs API cost
