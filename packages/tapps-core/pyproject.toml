[build-system]
requires = ["hatchling>=1.30.1,<2"]
build-backend = "hatchling.build"

[project]
name = "tapps-core"
version = "3.12.40"
description = "Shared infrastructure library for Tapps platform (config, security, logging, knowledge, memory, metrics)"
license = "MIT"
requires-python = ">=3.12"
authors = [
    { name = "TappsMCP Contributors" },
]
keywords = ["tapps", "infrastructure", "config", "security", "logging"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "tapps-brain>=3.24.0,<4",
    "pydantic>=2.13.4,<3",
    "pydantic-settings>=2.14.1,<3",
    "structlog>=26.1.0,<27",
    # Security floors for transitive CVEs (TAP-1764).
    "python-dotenv>=1.2.2,<2",         # CVE-2026-28684 via pydantic-settings
    "pyyaml>=6.0.3,<7",
    "httpx>=0.28.1,<1",
]

[project.optional-dependencies]
vector = [
    "faiss-cpu>=1.14.3,<2",
    "sentence-transformers>=5.5.1,<6",
    "numpy>=2.4.6,<3",
]
reranker = [
    "cohere>=7.0.4,<8",
]

[tool.hatch.build.targets.sdist]
include = ["src/tapps_core/"]

[tool.hatch.build.targets.wheel]
packages = ["src/tapps_core"]
