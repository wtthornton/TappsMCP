# TappsMCP default configuration
# Override per-project in .tapps-mcp.yaml or via TAPPS_MCP_* env vars.

quality_preset: standard
log_level: INFO
log_json: false
tool_timeout: 30

scoring_weights:
  complexity: 0.18
  security: 0.27
  maintainability: 0.24
  test_coverage: 0.13
  performance: 0.08
  structure: 0.05
  devex: 0.05

adaptive:
  enabled: false
  learning_rate: 0.1
  min_outcomes: 5

memory:
  enabled: true
  gc_enabled: true
  contradiction_check_on_start: true
  max_memories: 1500
  injection_max_tokens: 2000  # Epic 65.16: cap injected memory context (~4 chars/token)
  inject_into_experts: true
  semantic_search:
    enabled: false
    provider: sentence_transformers
    model: all-MiniLM-L6-v2
  decay:
    architectural_half_life_days: 180
    pattern_half_life_days: 60
    procedural_half_life_days: 30  # Epic 65.11: workflows, steps
    context_half_life_days: 14
    confidence_floor: 0.1
  session_index:  # Epic 65.10
    enabled: false
    max_chunks_per_session: 50
    max_chars_per_chunk: 500
    ttl_days: 7
