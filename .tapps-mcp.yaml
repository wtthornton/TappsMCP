llm_engagement_level: medium
cursor_stop_completion_gate: warn
mcp_bundle: full
quality_preset: standard
install_git_hooks: true
docs_via_brain: true
linear_team: TAP
linear_project: TappsMCP Platform
memory_hooks:
  auto_recall:
    recall_keys:
    - tapps-mcp-nlt-bundle-preference
    - tapps-mcp-nlt-memory-httpcore-fix
memory:
  brain_project_id: tapps-mcp
  brain_http_url: http://localhost:8080
  brain_profile: full
  profile: document-builder
linear_enforce_gate: true
thresholds:
  overall: 70
  security_floor: 50
max_memories: 1500
gc_auto_threshold: 0.8
memory_decay_enabled: true
adaptive:
  enabled: true
security:
  content_safety: true
  secret_scanning: true
experts:
  auto_generate: true
cache_max_mb: 100
validate_changed:
  judges:
  - type: grep
    target: .claude/skills/linear/node_modules/graphql/utilities/buildASTSchema.mjs
    expect: --audit
    description: Site prebuild runs document build with post-build audit
    blocking: true
    when_changed:
    - .claude/skills/linear/node_modules/graphql/utilities/buildASTSchema.mjs
    - reports/**
    - src/**
    - brands/**
    - templates/**
mcp_transport: http
