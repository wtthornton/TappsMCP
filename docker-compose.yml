# TappMCP — local Docker MCP server (Streamable HTTP on port 8000)
# Usage: docker compose up --build -d
# Connect: MCP client to http://localhost:8000/mcp (Streamable HTTP)

services:
  tapps-mcp:
    build: .
    image: tappmcp:local
    container_name: tappmcp-mcp
    ports:
      - "8000:8000"
    environment:
      TAPPS_MCP_PROJECT_ROOT: /workspace
      TAPPS_MCP_QUALITY_PRESET: standard
      TAPPS_MCP_LOG_LEVEL: INFO
    volumes:
      # Mount host project so the server can score files (optional; omit to use container-only)
      - .:/workspace:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://127.0.0.1:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
