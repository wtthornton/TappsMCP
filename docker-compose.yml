# TappsMCP -- local Docker MCP server (Streamable HTTP on port 8000)
# Usage: docker compose up --build -d
# Connect: MCP client to http://localhost:8000/mcp (Streamable HTTP)

services:
  tapps-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: tappsmcp:local
    container_name: tappsmcp-mcp
    ports:
      - "8000:8000"
    environment:
      TAPPS_MCP_PROJECT_ROOT: /workspace
      # Optional: set to the host path Cursor uses (e.g. C:\cursor\TappsMCP) so host paths are accepted
      # TAPPS_MCP_HOST_PROJECT_ROOT: "C:\\cursor\\TappsMCP"
      TAPPS_MCP_QUALITY_PRESET: standard
      TAPPS_MCP_LOG_LEVEL: INFO
    volumes:
      - .:/workspace
      - tapps-state:/workspace/.tapps-mcp
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

volumes:
  tapps-state:
