name: docs-mcp
image: ghcr.io/tapps-mcp/docs-mcp:latest
type: server
meta:
  category: developer-tools
  tags:
    - documentation
    - docs
    - readme
    - changelog
    - api-docs
    - mcp
    - code-analysis
about:
  title: "DocsMCP - Documentation Generation & Maintenance"
  description: >
    Documentation MCP server for automated generation, validation, and
    maintenance. Generates READMEs, API references, changelogs, release
    notes, architecture decision records, onboarding guides, and diagrams.
    Validates documentation drift, completeness, link integrity, and
    freshness. 18 tools grounded in AST parsing, git history analysis,
    and import graph traversal.
  icon: https://raw.githubusercontent.com/tapps-mcp/tapps-mcp/master/docs/icon.png
source:
  project: https://github.com/tapps-mcp/tapps-mcp
  license: MIT
config:
  description: >
    Mount your project directory to /workspace. Git must be available
    in the container for history analysis features.
  environment:
    - name: TAPPS_MCP_PROJECT_ROOT
      value: /workspace
      mount: true
      description: "Project root directory (mounted from host)"
