# .github/workflows/agents-md-stamp.yml
# TAP-982: fail the build if AGENTS.md <!-- tapps-agents-version: X.Y.Z -->
# does not match packages/tapps-mcp/pyproject.toml. Prevents release-time
# stamp drift like the 3.2.4 vs 3.3.0 gap found in TAP-972.
name: AGENTS.md Stamp Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: agents-md-stamp-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify-stamp:
    name: Verify AGENTS.md stamp matches package version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Check stamp
        run: uv run tapps-mcp check-agents-md-stamp
