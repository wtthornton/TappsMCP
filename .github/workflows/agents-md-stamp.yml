# .github/workflows/agents-md-stamp.yml
# TAP-982 + TAP-1372 + TAP-1378: fail the build if any derived file lags
# packages/tapps-mcp/pyproject.toml. The release flow has bumped pyproject
# without refreshing AGENTS.md's stamp three times in two days (commits
# 79ef6e3, 2e2f378, 05caaaa); scripts/bump-versions.py --check now owns
# the gate so the bump and the verify share one source of truth.
name: AGENTS.md Stamp Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: agents-md-stamp-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  verify-stamp:
    name: Verify derived files in sync with tapps-mcp pyproject
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run bump-versions --check
        run: python3 scripts/bump-versions.py --check
