# DocsMCP validation for tier-1 documentation (documentation refresh plan Phase 5).
name: Docs Quality Gate

on:
  pull_request:
    branches: [main, master]
    paths:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "llms.txt"
      - "llms-full.txt"
      - "scripts/docs-quality-gate.py"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-quality-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: docs-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Auth private git deps
        # Fine-grained PAT: contents:read on wtthornton/ReportLab. Required for
        # clean runners when nlt-report-studio is resolved from git (TAP-4837).
        env:
          REPORTLAB_READ_PAT: ${{ secrets.REPORTLAB_READ_PAT }}
        run: |
          if [ -z "$REPORTLAB_READ_PAT" ]; then
            echo "::error::REPORTLAB_READ_PAT secret is required for uv sync (private nlt-report-studio git dep). See TAP-4837."
            exit 1
          fi
          git config --global url."https://x-access-token:${REPORTLAB_READ_PAT}@github.com/".insteadOf "https://github.com/"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install workspace
        run: uv sync --all-packages --group dev

      - name: Run docs quality gate
        run: uv run python scripts/docs-quality-gate.py
