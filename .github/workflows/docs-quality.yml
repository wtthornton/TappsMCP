# DocsMCP validation for tier-1 documentation (documentation refresh plan Phase 5).
name: Docs Quality Gate

on:
  pull_request:
    branches: [main, master]
    paths:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
      - "CONTRIBUTING.md"
      - "CHANGELOG.md"
      - "llms.txt"
      - "llms-full.txt"
      - "scripts/docs-quality-gate.py"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-quality-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  docs:
    name: docs-quality-gate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install workspace
        run: uv sync --all-packages --group dev

      - name: Run docs quality gate
        run: uv run python scripts/docs-quality-gate.py
