name: CI

on:
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen --dev

      - name: Lint
        # Temporarily non-blocking: PR #103 fixes the uv.lock that was masking
        # 334 pre-existing ruff errors. Cleanup lands in a follow-up PR which
        # also reverts this `continue-on-error`. See PR #103 discussion.
        continue-on-error: true
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Test tapps-core
        run: uv run pytest packages/tapps-core/tests/ -x -q

      - name: Test tapps-mcp
        run: uv run pytest packages/tapps-mcp/tests/ -x -q

      - name: Test docs-mcp
        run: uv run pytest packages/docs-mcp/tests/ -x -q

      - name: Build
        run: uv build
