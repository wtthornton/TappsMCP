name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --frozen --dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  test:
    needs: lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        package:
          - name: tapps-core
            path: packages/tapps-core
          - name: tapps-mcp
            path: packages/tapps-mcp
          - name: docs-mcp
            path: packages/docs-mcp
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv sync --frozen --dev
      - name: Run tests (${{ matrix.package.name }})
        run: uv run pytest ${{ matrix.package.path }}/tests/ -x -q

  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv build
