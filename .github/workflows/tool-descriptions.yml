# TAP-1963: reject registered MCP tool descriptions that exceed the catalog
# length budget (median < 200 chars, max <= 500 chars per server).
name: tool-descriptions

on:
  pull_request:
    branches: [main, master]
    paths:
      - "packages/tapps-mcp/src/**"
      - "packages/docs-mcp/src/**"
      - "packages/tapps-mcp/tests/integration/test_tool_descriptions.py"
      - ".github/workflows/tool-descriptions.yml"
  push:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: tool-descriptions-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: MCP tool-description budget
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --all-packages

      - name: Run tool description budget test
        run: uv run pytest packages/tapps-mcp/tests/integration/test_tool_descriptions.py -v
