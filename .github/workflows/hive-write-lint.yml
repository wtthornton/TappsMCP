# .github/workflows/hive-write-lint.yml
# TAP-2015: reject hive writes that lack a # hive-approved: TAP-XXXX annotation.
# Hive writes propagate memory to every agent and project sharing the Hive;
# each occurrence must reference a maintainer-approved Linear issue.
name: hive-write lint

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

concurrency:
  group: hive-write-lint-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: check hive-approved annotations
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fail on unapproved hive writes
        shell: bash
        run: |
          # Collect Python source lines that perform hive writes.
          # A valid hive write must have "# hive-approved: TAP-" on the same
          # line OR on the immediately preceding non-blank line.
          set +e
          VIOLATIONS=0
          while IFS=: read -r file lineno rest; do
            # Grab the two lines immediately before this one (for preceding-comment style).
            start=$(( lineno - 2 ))
            [ "$start" -lt 1 ] && start=1
            context=$(sed -n "${start},$((lineno))p" "$file")
            if ! echo "$context" | grep -qE '#\s*hive-approved:\s*TAP-'; then
              echo "VIOLATION: $file:$lineno — hive write without # hive-approved: TAP-XXXX"
              VIOLATIONS=$(( VIOLATIONS + 1 ))
            fi
          done < <(grep -rnE \
            'agent_scope\s*=\s*["\x27]hive["\x27]|action\s*=\s*["\x27]hive_(push|propagate)["\x27]' \
            packages/ \
            --include="*.py" \
            -n)

          if [ "$VIOLATIONS" -gt 0 ]; then
            echo ""
            echo "$VIOLATIONS unapproved hive write(s) found."
            echo "Add '# hive-approved: TAP-XXXX' on the same or preceding line."
            echo "See CONTRIBUTING.md § 'Hive Writes Require a Linked Approval'."
            exit 1
          fi
          echo "No unapproved hive writes found."
