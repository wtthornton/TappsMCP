name: Build and Push Docker Images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write
  id-token: write  # cosign keyless signing
  security-events: write  # Trivy SARIF upload

env:
  TAPPS_IMAGE: ghcr.io/wtthornton/tapps-mcp
  DOCS_IMAGE: ghcr.io/wtthornton/docs-mcp

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: tapps-mcp
            dockerfile: Dockerfile
            image_env: TAPPS_IMAGE
            expected_tools: 28
          - name: docs-mcp
            dockerfile: packages/docs-mcp/Dockerfile
            image_env: DOCS_IMAGE
            expected_tools: 18
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd  # v4.0.0

      - name: Set up QEMU for multi-arch
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0

      - name: Log in to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          echo "major_minor=${TAG%.*}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ matrix.name == 'tapps-mcp' && env.TAPPS_IMAGE || env.DOCS_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294  # v7.0.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac  # v3

      - name: Sign image with cosign (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ matrix.name == 'tapps-mcp' && env.TAPPS_IMAGE || env.DOCS_IMAGE }}
        run: |
          cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Generate SBOM
        run: |
          docker run --rm \
            anchore/syft:latest \
            ${{ matrix.name == 'tapps-mcp' && env.TAPPS_IMAGE || env.DOCS_IMAGE }}:latest \
            -o spdx-json > sbom-${{ matrix.name }}.json

      - name: Upload SBOM
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.json

  scan:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        include:
          - name: tapps-mcp
            image_env: TAPPS_IMAGE
          - name: docs-mcp
            image_env: DOCS_IMAGE
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
      - name: Pull published image
        run: |
          IMAGE="${{ matrix.name == 'tapps-mcp' && env.TAPPS_IMAGE || env.DOCS_IMAGE }}:latest"
          docker pull "$IMAGE"
          docker tag "$IMAGE" "${{ matrix.name }}:scan"
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1  # 0.35.0
        with:
          image-ref: ${{ matrix.name }}:scan
          format: sarif
          output: trivy-results-${{ matrix.name }}.sarif
          severity: CRITICAL,HIGH
      - name: Upload Trivy scan results to GitHub Security
        uses: github/codeql-action/upload-sarif@603b797f8b14b413fe025cd935a91c16c4782713  # v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: trivy-results-${{ matrix.name }}.sarif
          category: trivy-${{ matrix.name }}

  smoke-test:
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        include:
          - name: tapps-mcp
            image_env: TAPPS_IMAGE
            version_cmd: "tapps-mcp --version"
          - name: docs-mcp
            image_env: DOCS_IMAGE
            version_cmd: "docsmcp --version"
    steps:
      - name: Pull and verify image
        run: |
          IMAGE="${{ matrix.name == 'tapps-mcp' && env.TAPPS_IMAGE || env.DOCS_IMAGE }}:latest"
          docker pull "$IMAGE"
          docker run --rm "$IMAGE" ${{ matrix.version_cmd }}
