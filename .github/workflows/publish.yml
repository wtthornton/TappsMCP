name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify tag matches all package versions
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          echo "Git tag version: $TAG_VERSION"
          FAILED=0
          for pkg in tapps-core tapps-mcp docs-mcp; do
            PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('packages/${pkg}/pyproject.toml','rb'))['project']['version'])")
            echo "  ${pkg}: $PKG_VERSION"
            if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
              echo "::error::Tag version ($TAG_VERSION) does not match packages/${pkg}/pyproject.toml version ($PKG_VERSION)"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then exit 1; fi

  build:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        package:
          - name: tapps-core
            path: packages/tapps-core
          - name: tapps-mcp
            path: packages/tapps-mcp
          - name: docs-mcp
            path: packages/docs-mcp
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build ${{ matrix.package.name }}
        run: uv build --package ${{ matrix.package.name }}
      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.package.name }}
          path: dist/

  # Publish tapps-core first (dependency of tapps-mcp and docs-mcp)
  publish-core:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-tapps-core
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  # Publish tapps-mcp and docs-mcp after tapps-core is on PyPI
  publish-tapps-mcp:
    needs: publish-core
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-tapps-mcp
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-docs-mcp:
    needs: publish-core
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-docs-mcp
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [publish-tapps-mcp, publish-docs-mcp]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: dist-tapps-core
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: dist-tapps-mcp
          path: dist/
      - uses: actions/download-artifact@v4
        with:
          name: dist-docs-mcp
          path: dist/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*

  publish-mcp-registry:
    needs: [publish-tapps-mcp, publish-docs-mcp]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_linux_amd64.tar.gz" | tar xz mcp-publisher
          chmod +x mcp-publisher
      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
      - name: Update server.json versions from tag
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          for pkg in tapps-mcp docs-mcp; do
            jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' \
              packages/${pkg}/server.json > packages/${pkg}/server.json.tmp \
              && mv packages/${pkg}/server.json.tmp packages/${pkg}/server.json
          done
      - name: Publish to MCP Registry
        run: |
          cd packages/tapps-mcp && ../../mcp-publisher publish && cd ../..
          cd packages/docs-mcp && ../../mcp-publisher publish && cd ../..
