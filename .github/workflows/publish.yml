name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write  # OIDC trusted publishing

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PKG_VERSION=$(python -c "import tomllib; print(tomllib.load(open('packages/tapps-mcp/pyproject.toml','rb'))['project']['version'])")
          echo "Git tag version: $TAG_VERSION"
          echo "Package version (tapps-mcp): $PKG_VERSION"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match packages/tapps-mcp/pyproject.toml version ($PKG_VERSION)"
            exit 1
          fi

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          version: "latest"
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: uv build
      - name: Verify build artifacts
        run: |
          ls -la dist/
          python -m zipfile -l dist/*.whl | head -20
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  build-exe:
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyInstaller and built wheels
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install dist/*.whl
      - name: Build tapps-mcp.exe
        run: |
          python -m PyInstaller --onefile -n tapps-mcp --console scripts/run_tapps_mcp.py
      - name: Upload exe artifact
        uses: actions/upload-artifact@v6
        with:
          name: exe
          path: dist/tapps-mcp.exe

  test-install:
    needs: build
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install dist/*.whl
        shell: bash
      - run: tapps-mcp --version
      - run: tapps-mcp --help

  publish-testpypi:
    needs: test-install
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: [publish-pypi, build-exe]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/
      - uses: actions/download-artifact@v6
        with:
          name: exe
          path: exe/
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp exe/tapps-mcp.exe dist/ 2>/dev/null || true
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            dist/*
