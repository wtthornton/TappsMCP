# .github/workflows/brain-contract.yml
# TAP-516: contract test for HttpBrainBridge against the already-deployed
# tapps-brain HTTP adapter. This workflow does NOT deploy brain — it hits
# the URL provided via TAPPS_BRAIN_HTTP_URL (repo secret or variable).
#
# Runs in two modes:
#
# 1. Path-filtered PR gate — fires only when the bridge, the contract test,
#    or this workflow changes. Avoids blocking unrelated PRs when brain
#    ships a breaking change (bridge correctness is decoupled from the PR
#    under review).
#
# 2. Nightly scheduled run — catches drift against the live deployment
#    without blocking merges. See TAP-800 for the current drift backlog.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#
#   TAPPS_BRAIN_HTTP_URL   — URL of the deployed brain (e.g.
#                            https://brain.example.internal). Can be set
#                            as a repository Variable instead if the URL
#                            isn't sensitive.
#   TAPPS_BRAIN_AUTH_TOKEN — bearer token the deployed brain accepts.
#
# Mark the PR job as required via branch protection (Settings → Branches)
# once this workflow is stable.
name: brain-contract

on:
  pull_request:
    branches: [main, master]
    paths:
      - "packages/tapps-core/src/tapps_core/brain_bridge.py"
      - "packages/tapps-mcp/tests/integration/test_brain_http_contract.py"
      - ".github/workflows/brain-contract.yml"
  schedule:
    - cron: "17 7 * * *"  # 07:17 UTC nightly
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: brain-contract-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: HttpBrainBridge contract
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout tapps-mcp
        uses: actions/checkout@v6

      - name: Assert deployment config is present
        env:
          BRAIN_URL: ${{ secrets.TAPPS_BRAIN_HTTP_URL || vars.TAPPS_BRAIN_HTTP_URL }}
          BRAIN_TOKEN: ${{ secrets.TAPPS_BRAIN_AUTH_TOKEN }}
        run: |
          if [ -z "${BRAIN_URL}" ]; then
            echo "::error::TAPPS_BRAIN_HTTP_URL is not configured (secret or variable)."
            exit 1
          fi
          if [ -z "${BRAIN_TOKEN}" ]; then
            echo "::error::TAPPS_BRAIN_AUTH_TOKEN secret is not configured."
            exit 1
          fi

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install tapps-mcp dependencies
        run: uv sync --all-packages

      - name: Probe brain /health (fail fast on outage)
        env:
          BRAIN_URL: ${{ secrets.TAPPS_BRAIN_HTTP_URL || vars.TAPPS_BRAIN_HTTP_URL }}
        run: |
          if ! curl -fsS --max-time 10 "${BRAIN_URL}/health"; then
            echo
            echo "::error::deployed brain at ${BRAIN_URL} is unreachable"
            exit 1
          fi
          echo

      - name: Run contract test
        env:
          TAPPS_BRAIN_HTTP_URL: ${{ secrets.TAPPS_BRAIN_HTTP_URL || vars.TAPPS_BRAIN_HTTP_URL }}
          TAPPS_MCP_MEMORY_BRAIN_AUTH_TOKEN: ${{ secrets.TAPPS_BRAIN_AUTH_TOKEN }}
          TAPPS_BRAIN_CONTRACT_PROJECT_ID: tapps-mcp-ci
          TAPPS_BRAIN_CONTRACT_AGENT_ID: tapps-mcp-ci
        run: |
          uv run pytest \
            packages/tapps-mcp/tests/integration/test_brain_http_contract.py \
            -v --tb=short
