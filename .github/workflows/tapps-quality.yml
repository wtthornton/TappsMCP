# .github/workflows/tapps-quality.yml
# Generated by TappsMCP tapps_init — edit as needed
name: TappsMCP Quality Gate

on:
  pull_request:
    paths:
      - "**.py"
  workflow_dispatch:
    inputs:
      preset:
        description: "Quality preset (standard, strict, framework)"
        required: false
        default: "staging"
        type: choice
        options:
          - standard
          - strict
          - framework

permissions:
  contents: read

concurrency:
  group: tapps-quality-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install workspace (tapps-mcp + checkers)
        run: uv sync --frozen --dev

      - name: Run TappsMCP quality gate
        env:
          TAPPS_MCP_PROJECT_ROOT: ${{ github.workspace }}
        run: uv run tapps-mcp validate-changed --full

      - name: Upload quality report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tapps-quality-report
          path: .tapps-mcp/reports/
          retention-days: 30
          if-no-files-found: ignore
