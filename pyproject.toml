[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
tapps-brain = { git = "https://github.com/wtthornton/tapps-brain.git", tag = "v1.0.1" }

[tool.uv]
dev-dependencies = [
    "pytest>=9.0.2,<10",
    "pytest-asyncio>=1.3.0,<2",
    "pytest-cov>=7.0.0,<8",
    "pytest-timeout>=2.4.0,<3",
    "mypy>=1.19.1,<2",
    "ruff>=0.15.2,<1",
    "pre-commit>=4.5.1,<5",
    "types-PyYAML>=6.0.12",
    "playwright>=1.58.0,<2",
    # tree-sitter for docs-mcp multi-language extraction tests
    "tree-sitter>=0.24.0,<1",
    "tree-sitter-typescript>=0.23.2,<1",
    "tree-sitter-go>=0.23.4,<1",
    "tree-sitter-rust>=0.23.2,<1",
    "tree-sitter-java>=0.23.5,<1",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = [
    "packages/tapps-core/src",
    "packages/tapps-mcp/src",
    "packages/docs-mcp/src",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "S",    # flake8-bandit
    "T20",  # flake8-print
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
    "ANN",  # flake8-annotations
    "C4",   # flake8-comprehensions
    "PTH",  # flake8-use-pathlib
    "PL",   # pylint
]
ignore = [
    "S603",    # subprocess call - check for execution of untrusted input (we handle this)
    "S607",    # starting a process with a partial executable path
    "PLC0415", # import not at top-level — we use lazy imports intentionally
    "PLR0913", # too many arguments — acceptable for config-heavy tool runners
    "PLR0912", # too many branches — acceptable for multi-tool dispatch
    "PLR0915", # too many statements — acceptable for composite tool handlers
]

[tool.ruff.lint.per-file-ignores]
"examples/**/*.py" = ["T201", "PTH109"]
"packages/*/tests/**/*.py" = ["S101", "S105", "S106", "S108", "ANN", "PLR2004", "TC001", "TC003", "RUF059", "B007"]
"packages/tapps-mcp/src/tapps_mcp/metrics/**/*.py" = ["PLR2004"]
"scripts/**/*.py" = ["T201", "E501", "PLR2004", "ANN"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
follow_imports = "normal"
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["mcp", "mcp.*", "mcp.server.*", "mcp.server.fastmcp.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tapps_mcp.server"
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = ["sentence_transformers", "sentence_transformers.*", "faiss", "numpy", "numpy.*", "radon", "radon.*", "tapps_brain", "tapps_brain.*", "tree_sitter", "tree_sitter_go", "tree_sitter_rust", "tree_sitter_java", "tree_sitter_typescript"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_untyped_decorators = false

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.pytest.ini_options]
testpaths = [
    "packages/tapps-core/tests",
    "packages/tapps-mcp/tests",
    "packages/docs-mcp/tests",
]
asyncio_mode = "auto"
timeout = 60
markers = [
    "integration: marks tests as integration tests",
    "slow: marks tests as slow (subprocess-heavy, may be skipped with -m 'not slow')",
    "optional_deps: marks tests requiring optional dependencies (sentence-transformers, faiss-cpu, cohere)",
]
addopts = "-v --tb=short"
filterwarnings = [
    "ignore:tapps_core\\.memory is deprecated:DeprecationWarning",
]

[tool.coverage.run]
source = ["tapps_core", "tapps_mcp", "docs_mcp"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
    "@overload",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2,<10",
    "pytest-asyncio>=1.3.0,<2",
    "pytest-cov>=7.0.0,<8",
    "mypy>=1.19.1,<2",
    "ruff>=0.15.2,<1",
    "types-PyYAML>=6.0.12",
]
