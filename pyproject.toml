[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
# tapps-brain is sourced from its GitHub repo pinned to the v3.8.0 commit SHA so
# both local dev and CI resolve the same artifact. When v3.8.0 is tagged/released
# on GitHub (or published to PyPI), swap this for ``tag = "v3.8.0"`` or remove
# the ``[tool.uv.sources]`` entry entirely and rely on the version pin in
# ``packages/tapps-core/pyproject.toml``.
tapps-brain = { git = "https://github.com/wtthornton/tapps-brain.git", rev = "a3654693df32d64f65cd3d97e7e28b2499a5308b" }

[tool.uv]
dev-dependencies = [
    "pytest>=9.0.2,<10",
    "pytest-asyncio>=1.3.0,<2",
    "pytest-cov>=7.1.0,<8",
    "pytest-timeout>=2.4.0,<3",
    "pytest-xdist>=3.5.0,<4",
    "pytest-randomly>=3.16.0,<4",
    "mypy>=1.19.1,<2",
    "ruff>=0.15.2,<1",
    "pre-commit>=4.5.1,<5",
    "types-PyYAML>=6.0.12",
    "playwright>=1.58.0,<2",
    # tree-sitter for docs-mcp multi-language extraction tests
    "tree-sitter>=0.24.0,<1",
    "tree-sitter-typescript>=0.23.2,<1",
    "tree-sitter-go>=0.23.4,<1",
    "tree-sitter-rust>=0.23.2,<1",
    "tree-sitter-java>=0.23.5,<1",
]

[tool.ruff]
target-version = "py312"
line-length = 100
src = [
    "packages/tapps-core/src",
    "packages/tapps-mcp/src",
    "packages/docs-mcp/src",
]
exclude = [
    ".claude",
    "build",
    "dist",
    "cursorTappMCPdisttest_env",
]

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "S",    # flake8-bandit
    "T20",  # flake8-print
    "SIM",  # flake8-simplify
    "TCH",  # flake8-type-checking
    "RUF",  # ruff-specific rules
    "ANN",  # flake8-annotations
    "C4",   # flake8-comprehensions
    "PTH",  # flake8-use-pathlib
    "PL",   # pylint
]
ignore = [
    "S603",    # subprocess call - check for execution of untrusted input (we handle this)
    "S607",    # starting a process with a partial executable path
    "PLC0415", # import not at top-level — we use lazy imports intentionally
    "PLC0414", # import-alias-not-renamed — `import X as X` is the standard re-export idiom
    "PLR0913", # too many arguments — acceptable for config-heavy tool runners
    "PLR0912", # too many branches — acceptable for multi-tool dispatch
    "PLR0915", # too many statements — acceptable for composite tool handlers
    "PLR0911", # too many return statements
    "PLR2004", # magic-value-comparison — too pervasive, low signal
    "ANN401",  # dynamically-typed-expression (Any) — necessary for generic APIs
    "E501",    # line-too-long — handled by ruff format; remaining are strings/comments
    "E402",    # module-import-not-at-top — lazy/conditional imports are intentional
    "PLW0603", # global-statement — used intentionally in several modules
    "S110",    # try-except-pass — intentional in resilient error handling
    "S101",    # assert — used in non-test validation code intentionally
    "TC003",   # typing-only-standard-library-import — refactoring suggestion, not a bug
    "TC002",   # typing-only-third-party-import — refactoring suggestion, not a bug
    "TC001",   # typing-only-first-party-import — refactoring suggestion, not a bug
    "SIM102",  # collapsible-if — readability is subjective
    "SIM103",  # needless-bool — readability is subjective
    "SIM108",  # if-else-block-instead-of-if-exp — ternary not always clearer
    "SIM105",  # suppressible-exception — contextlib.suppress not always clearer
    "SIM110",  # reimplemented-builtin — any()/all() rewrite not always clearer
    "SIM117",  # multiple-with-statements — multi-with not always clearer
    "SIM201",  # negate-equal-op — style preference
    "PLW0108", # unnecessary-lambda — sometimes clearer with lambda
    "PLW2901", # redefined-loop-name — common pattern for stripping loop vars
    "PLW1510", # subprocess-run-without-check — handled explicitly
    "PLR1714", # repeated-equality-comparison — readability preference
    "PLR0124", # comparison-with-itself — used intentionally in identity tests
    "S112",    # try-except-continue — intentional in resilient loops
    "S701",    # jinja2-autoescape-false — generating markdown, not HTML
    "A002",    # builtin-argument-shadowing — `format`, `type`, `id` used as parameters
    "E741",    # ambiguous-variable-name — single-char vars acceptable in comprehensions
    "RUF012",  # mutable-class-default — acceptable in test fixtures
    "RUF043",  # match-pattern-with-metacharacters — intentional in test patterns
    "PLC0206", # dict-index-missing-items — style preference
]

[tool.ruff.lint.per-file-ignores]
"examples/**/*.py" = ["T201", "PTH109"]
# N806 covers the `with patch(...) as MockClient:` idiom where the binding
# carries an intentional class-like name to mirror what's being patched.
"packages/*/tests/**/*.py" = ["S101", "S105", "S106", "S108", "ANN", "PLR2004", "TC001", "TC003", "RUF059", "B007", "B017", "F841", "PLW2901", "N806"]
"packages/tapps-mcp/src/tapps_mcp/metrics/**/*.py" = ["PLR2004"]
# Benchmark fixtures use random for synthetic data, not crypto.
"packages/tapps-mcp/src/tapps_mcp/benchmark/**/*.py" = ["S311"]
# Pattern-poster generators intentionally use the `×` (MULTIPLICATION SIGN)
# in docstrings/comments to describe grid dimensions like "2×3 grid".
"packages/docs-mcp/src/docs_mcp/generators/pattern_poster.py" = ["RUF002", "RUF003"]
"packages/docs-mcp/src/docs_mcp/generators/diagrams.py" = ["RUF002", "RUF003"]
"packages/docs-mcp/tests/unit/test_pattern_poster.py" = ["RUF002"]
"scripts/**/*.py" = ["T201", "E501", "PLR2004", "ANN", "PTH"]
"tests/**/*.py" = ["S101", "S105", "S106", "S108", "ANN", "PLR2004", "TC001", "TC003", "RUF059", "B007", "B017", "F841", "N806"]

[tool.mypy]
python_version = "3.12"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
disallow_untyped_decorators = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
follow_imports = "normal"
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["mcp", "mcp.*", "mcp.server.*", "mcp.server.fastmcp.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "tapps_mcp.server"
disallow_untyped_decorators = false

[[tool.mypy.overrides]]
module = ["sentence_transformers", "sentence_transformers.*", "faiss", "numpy", "numpy.*", "radon", "radon.*", "pylint", "pylint.*", "perflint", "perflint.*", "tapps_brain", "tapps_brain.*", "tree_sitter", "tree_sitter_go", "tree_sitter_rust", "tree_sitter_java", "tree_sitter_typescript", "datasets", "pyarrow", "pyarrow.*", "pandas", "pandas.*"]
ignore_missing_imports = true

[[tool.mypy.overrides]]
# Backward-compat shims use try/except ImportError to handle removed tapps-brain v2 modules.
# mypy's warn_unused_ignores interacts poorly with ignore_missing_imports in this pattern:
# the type: ignore is needed on cold cache (no-redef detected) but "unused" on warm cache.
module = [
    "tapps_core.memory.federation",
    "tapps_core.memory.persistence",
]
warn_unused_ignores = false

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false
disallow_untyped_decorators = false

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.pytest.ini_options]
testpaths = [
    "packages/tapps-core/tests",
    "packages/tapps-mcp/tests",
    "packages/docs-mcp/tests",
]
asyncio_mode = "auto"
timeout = 60
markers = [
    "integration: marks tests as integration tests",
    "slow: marks tests as slow (subprocess-heavy, may be skipped with -m 'not slow')",
    "optional_deps: marks tests requiring optional dependencies (sentence-transformers, faiss-cpu, cohere)",
]
addopts = "-v --tb=short -p randomly --randomly-seed=last"
filterwarnings = [
    "ignore:tapps_core\\.memory is deprecated:DeprecationWarning",
    "ignore:tapps_core\\.memory\\.gc is deprecated:DeprecationWarning",
    "ignore:tapps_core\\.memory\\.consolidation is deprecated:DeprecationWarning",
    "ignore:tapps_core\\.memory\\.auto_consolidation is deprecated:DeprecationWarning",
    "ignore:tapps_core\\.memory\\.contradictions is deprecated:DeprecationWarning",
]

[tool.coverage.run]
source = ["tapps_core", "tapps_mcp", "docs_mcp"]
branch = true

[tool.coverage.report]
show_missing = true
fail_under = 80
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.",
    "@overload",
]

[dependency-groups]
dev = [
    "pytest>=9.0.2,<10",
    "pytest-asyncio>=1.3.0,<2",
    "pytest-cov>=7.1.0,<8",
    "mypy>=1.19.1,<2",
    "ruff>=0.15.2,<1",
    "types-PyYAML>=6.0.12",
]
